# .github/workflows/sign-and-pack-ipa.yml
name: 签名并打包砸壳后的 IPA

on:
  workflow_dispatch:

jobs:
  sign-and-pack:
    runs-on: macos-latest  # ldid 在 macOS 上安装方便
    steps:
      - name: 安装 ldid
        run: brew install ldid

      - name: 下载原始加密 IPA
        uses: robinraju/release-downloader@v1.9
        with:
          repository: "Geeeeeker/dumpdecrypted"
          tag: "v1.0.0"
          fileName: "_7.0.17.ipa"
          out-file-path: "input"

      - name: 下载解密后的二进制文件
        uses: robinraju/release-downloader@v1.9
        with:
          repository: "Geeeeeker/dumpdecrypted"
          tag: "v1.0.0"
          fileName: "WeChat.decrypted"
          out-file-path: "input"

      - name: 解压并替换二进制
        run: |
          mkdir work
          cd work
          unzip -q ../input/_7.0.17.ipa
          APP_PATH=$(find Payload -name "*.app" -type d | head -n 1)
          BINARY_NAME=$(basename "$APP_PATH" .app)
          cp ../input/WeChat.decrypted "$APP_PATH/$BINARY_NAME"
          chmod +x "$APP_PATH/$BINARY_NAME"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          cd ..

      - name: 用 ldid 对主二进制和所有可执行文件签名
        run: |
          cd work
          APP_PATH="$APP_PATH"
          # 对主二进制签名
          ldid -S "$APP_PATH/$(basename "$APP_PATH" .app)"
          # 对 app 内的所有可执行文件（扩展、framework 等）签名
          find "$APP_PATH" -type f -perm +111 -exec ldid -S {} \;
          # 可选：对 Frameworks 目录下的 dylib 也签名
          find "$APP_PATH/Frameworks" -name "*.dylib" -exec ldid -S {} \; 2>/dev/null || true
          echo "✅ 签名完成"
          cd ..

      - name: 重新打包 IPA
        run: |
          cd work
          zip -qr ../WeChat_signed.ipa Payload/
          cd ..

      - name: 上传最终产物
        uses: actions/upload-artifact@v4
        with:
          name: WeChat_signed_ipa
          path: WeChat_signed.ipa
