name: Build and Package Clutch & dumpdecrypted

on:
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 安装 ldid 签名工具
      - name: Install ldid
        run: |
          brew install ldid
          ldid --version

      # ----- 编译 dumpdecrypted -----
      - name: Checkout dumpdecrypted source
        run: git clone https://github.com/stefanesser/dumpdecrypted.git

      - name: Compile dumpdecrypted
        run: |
          cd dumpdecrypted
          make
          file dumpdecrypted.dylib   # 确认文件类型

      # 使用 ldid 对 dumpdecrypted.dylib 进行签名
      - name: Sign dumpdecrypted.dylib with ldid
        run: |
          # 创建一个空的 entitlements 文件
          echo '<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict></dict></plist>' > empty_entitlements.plist
          
          # 使用 ldid 签名
          ldid -Sempty_entitlements.plist dumpdecrypted/dumpdecrypted.dylib
          echo "✅ Signed with ldid"

      # 创建 dumpdecrypted 的 .deb 包结构
      - name: Create dumpdecrypted package structure
        run: |
          mkdir -p dumpdecrypted_pkg/usr/lib
          cp dumpdecrypted/dumpdecrypted.dylib dumpdecrypted_pkg/usr/lib/
          mkdir -p dumpdecrypted_pkg/DEBIAN
          cat <<EOF > dumpdecrypted_pkg/DEBIAN/control
          Package: com.yourrepo.dumpdecrypted
          Version: 1.0.0
          Architecture: iphoneos-arm
          Maintainer: Your Name <your@email.com>
          Description: A tool to decrypt iOS apps (dumpdecrypted), signed with ldid for jailbreak.
          Depiction: https://github.com/stefanesser/dumpdecrypted
          EOF

      - name: Package dumpdecrypted
        run: |
          dpkg-deb -b dumpdecrypted_pkg com.yourrepo.dumpdecrypted_1.0.0_iphoneos-arm.deb
          file com.yourrepo.dumpdecrypted_1.0.0_iphoneos-arm.deb

      # ----- 下载并打包 Clutch -----
      - name: Download Clutch binary
        run: |
          wget https://github.com/KJCracks/Clutch/releases/download/2.0.4/Clutch-2.0.4
          chmod +x Clutch-2.0.4

      - name: Create Clutch package structure
        run: |
          mkdir -p clutch_pkg/usr/bin
          cp Clutch-2.0.4 clutch_pkg/usr/bin/Clutch
          mkdir -p clutch_pkg/DEBIAN
          cat <<EOF > clutch_pkg/DEBIAN/control
          Package: com.yourrepo.clutch
          Version: 2.0.4
          Architecture: iphoneos-arm
          Maintainer: Your Name <your@email.com>
          Description: A tool to decrypt iOS apps (Clutch).
          Depiction: https://github.com/KJCracks/Clutch
          EOF

      - name: Package Clutch
        run: |
          dpkg-deb -b clutch_pkg com.yourrepo.clutch_2.0.4_iphoneos-arm.deb
          file com.yourrepo.clutch_2.0.4_iphoneos-arm.deb

      # ----- 上传 .deb 包 -----
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: |
            com.yourrepo.dumpdecrypted_1.0.0_iphoneos-arm.deb
            com.yourrepo.clutch_2.0.4_iphoneos-arm.deb
