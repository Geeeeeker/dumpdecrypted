# .github/workflows/build-deb.yml
name: Build and Package Clutch & dumpdecrypted (signed with ldid)

on:
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ----- 安装 dpkg 和 ldid -----
      - name: Install dpkg and ldid
        run: |
          brew install dpkg ldid

      # ----- 编译 dumpdecrypted（仅 arm64）-----
      - name: Checkout dumpdecrypted source
        run: git clone https://github.com/stefanesser/dumpdecrypted.git

      - name: Patch Makefile for arm64 only and iOS 10 compatibility
        run: |
          cd dumpdecrypted
          cat > Makefile << 'EOF'
          GCC_BIN = `xcrun --sdk iphoneos --find gcc`
          SDK = `xcrun --sdk iphoneos --show-sdk-path`
          CFLAGS = -miphoneos-version-min=10.0
          GCC_BASE = $(GCC_BIN) -Os $(CFLAGS) -Wimplicit -isysroot $(SDK) -F$(SDK)/System/Library/Frameworks -F$(SDK)/System/Library/PrivateFrameworks
          GCC_UNIVERSAL = $(GCC_BASE) -arch arm64
          all: dumpdecrypted.dylib
          dumpdecrypted.dylib: dumpdecrypted.o
          	$(GCC_UNIVERSAL) -dynamiclib -o $@ $^
          %.o: %.c
          	$(GCC_UNIVERSAL) -c -o $@ $<
          clean:
          	rm -f *.o dumpdecrypted.dylib
          EOF
          make
          file dumpdecrypted.dylib
          lipo -info dumpdecrypted.dylib

      # ----- 使用 ldid 签名 -----
      - name: Sign dumpdecrypted.dylib with ldid
        run: |
          ldid -S dumpdecrypted/dumpdecrypted.dylib
          echo "✅ Signed with ldid"

      # ----- 创建 dumpdecrypted 的 .deb 包结构 -----
      - name: Create dumpdecrypted package structure
        run: |
          mkdir -p dumpdecrypted_pkg/usr/lib
          cp dumpdecrypted/dumpdecrypted.dylib dumpdecrypted_pkg/usr/lib/
          mkdir -p dumpdecrypted_pkg/DEBIAN
          cat <<EOF > dumpdecrypted_pkg/DEBIAN/control
          Package: com.yourrepo.dumpdecrypted
          Version: 1.0.0
          Architecture: iphoneos-arm64
          Maintainer: Your Name <your@email.com>
          Description: dumpdecrypted (signed with ldid, arm64, iOS 10+)
          Depiction: https://github.com/stefanesser/dumpdecrypted
          EOF

      - name: Package dumpdecrypted .deb
        run: |
          dpkg-deb -b dumpdecrypted_pkg com.yourrepo.dumpdecrypted_1.0.0_iphoneos-arm64.deb

      # ----- 下载 Clutch 二进制 -----
      - name: Download Clutch binary
        run: |
          wget https://github.com/KJCracks/Clutch/releases/download/2.0.4/Clutch-2.0.4
          chmod +x Clutch-2.0.4
          cp Clutch-2.0.4 clutch-iphoneos-arm

      # ----- 创建 Clutch 的 .deb 包 -----
      - name: Create Clutch package structure
        run: |
          mkdir -p clutch_pkg/usr/bin
          cp Clutch-2.0.4 clutch_pkg/usr/bin/Clutch
          mkdir -p clutch_pkg/DEBIAN
          cat <<EOF > clutch_pkg/DEBIAN/control
          Package: com.yourrepo.clutch
          Version: 2.0.4
          Architecture: iphoneos-arm
          Maintainer: Your Name <your@email.com>
          Description: Clutch (unsigned)
          Depiction: https://github.com/KJCracks/Clutch
          EOF

      - name: Package Clutch .deb
        run: |
          dpkg-deb -b clutch_pkg com.yourrepo.clutch_2.0.4_iphoneos-arm.deb

      # ----- 上传所有产物 -----
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-packages
          path: |
            dumpdecrypted/dumpdecrypted.dylib
            com.yourrepo.dumpdecrypted_1.0.0_iphoneos-arm64.deb
            clutch-iphoneos-arm
            com.yourrepo.clutch_2.0.4_iphoneos-arm.deb
